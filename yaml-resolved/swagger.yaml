openapi: 3.0.0
info:
  title: TrueBlocks API
  description: An API for accessing cached Ethereum blockchain data and accounts
  contact:
    email: jrush@quickblocks.io
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  version: 0.8.04
servers:
- url: https://virtserver.swaggerhub.com/trueblocks/TrueBlocks/0.8.04
  description: SwaggerHub API Auto Mocking
tags:
- name: Scraper
  description: Control the TrueBlocks scraper and build the index
- name: Accounts
  description: List, export, and cache address-based transactional data
- name: Blockchain
  description: Access and cache blockchain-related data
paths:
  /v0/scrape:
    get:
      tags:
      - Scraper
      summary: searches inventory
      description: Allows you to control the index
      operationId: searchInventory
      parameters:
      - name: mode
        in: query
        description: control the block and account scrapers
        required: true
        style: form
        explode: true
        schema:
          type: string
          enum:
          - run
          - quit
          - pause
          - restart
      - name: tool
        in: query
        description: process the index, monitors, or both (none means process timestamps
          only)
        required: true
        style: form
        explode: true
        schema:
          type: string
          enum:
          - index
          - monitors
          - none
          - both
      - name: pin
        in: query
        description: pin new chunks (and blooms) to IPFS (requires Pinata key)
        required: false
        style: form
        explode: true
        schema:
          type: boolean
          default: false
      - name: publish
        in: query
        description: publish the hash of the pin manifest to the UnchainedIndex smart
          contract
        required: false
        style: form
        explode: true
        schema:
          type: boolean
          default: false
      - name: sleep
        in: query
        description: the number of seconds to sleep between passes (default 14)
        required: false
        style: form
        explode: true
        schema:
          type: number
          default: 14
      responses:
        "200":
          description: search results matching criteria
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InventoryItem'
        "400":
          description: bad input parameter
components:
  schemas:
    InventoryItem:
      required:
      - id
      - manufacturer
      - name
      - releaseDate
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: d290f1ee-6c54-4b01-90e6-d701748f0851
        name:
          type: string
          example: Widget Adapter
        releaseDate:
          type: string
          format: date-time
          example: 2016-08-29T09:12:33.001Z
        manufacturer:
          $ref: '#/components/schemas/Manufacturer'
    Manufacturer:
      required:
      - name
      type: object
      properties:
        name:
          type: string
          example: ACME Corporation
        homePage:
          type: string
          format: url
          example: https://www.acme-corp.com
        phone:
          type: string
          example: 408-867-5309
