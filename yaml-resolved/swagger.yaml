        "200":
          description: status of the scraper
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/response'
  /scrape:
    get:
      tags:
      - Admin
      summary: searches inventory
      description: Allows you to control the index
      operationId: searchInventory
      parameters:
      - name: mode
        in: query
        description: control the block and account scrapers
        required: true
        style: form
        explode: true
        schema:
          type: string
          enum:
          - run
          - quit
          - pause
          - restart
      - name: tool
        in: query
        description: process the index, monitors, or both (none means process timestamps
          only)
        required: true
        style: form
        explode: true
        schema:
          type: string
          enum:
          - index
          - monitors
          - none
          - both
      - name: pin
        in: query
        description: pin new chunks (and blooms) to IPFS (requires Pinata key)
        required: false
        style: form
        explode: true
        schema:
          type: string
          enum:
          - ""
          - "true"
      - name: publish
        in: query
        description: publish the hash of the pin manifest to the UnchainedIndex smart
          contract
        required: false
        style: form
        explode: true
        schema:
          type: string
          enum:
          - ""
          - "true"
      - name: sleep
        in: query
        description: the number of seconds to sleep between passes (default 14)
        required: false
        style: form
        explode: true
        schema:
          type: number
      responses:
        "200":
          description: status of the scraper
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/response'
        "400":
          description: bad input parameter
